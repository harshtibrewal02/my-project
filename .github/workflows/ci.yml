name: CI/CD Pipeline

on:
  push:
    branches: [dev, stage, main]
  pull_request:
    branches: [dev, stage, main]

env:
  # Uses repo name automatically — works for ANY project
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Lint, Type Check & Test
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 mypy

      - name: Lint with flake8
        run: flake8 app/ tests/

      - name: Type check with mypy
        run: mypy app/

      - name: Run tests
        run: pytest tests/ -v

  # ─────────────────────────────────────────────
  # JOB 2: Build & Push Docker Image (SHA-tagged)
  # ─────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate SHA image tag
        id: meta
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────────
  # JOB 3: Deploy → Health Check → Auto Rollback
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy & Health Check
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage'

    steps:
      - name: Trigger Render deploy
        run: |
          echo "🚀 Deploying to Render..."
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for deployment to spin up
        run: |
          echo "⏳ Waiting 90s for Render to deploy..."
          sleep 90

      - name: Health check
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_APP_URL }}/api/v1/health")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::❌ Health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed!"

      - name: Auto rollback on failure
        if: failure()
        run: |
          echo "⚠️ Health check failed — rolling back to last stable version..."

          # Find the most recent successful deploy on Render
          PREV_DEPLOY_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=10" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for d in data:
              if d['deploy']['status'] == 'live':
                  print(d['deploy']['id'])
                  break
          ")

          # Rollback to that deploy
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/deploys/$PREV_DEPLOY_ID/rollback"

          echo "✅ Rolled back to: $PREV_DEPLOY_ID"